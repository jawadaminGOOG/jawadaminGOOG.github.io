<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #24292e;
        background-color: #ffffff;
        line-height: 1.6;
        font-size: 16px;
      }
      a {
        color: #0366d6;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .site-header {
        width: 100%;
        border-bottom: 1px solid #e1e4e8;
        padding: 16px 24px;
        background: #fafbfc;
        position: relative;
      }
      .site-header-inner {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .site-title {
        font-weight: 600;
        font-size: 1rem;
        color: #0366d6;
      }
      .main-content {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 24px;
      }
      .post-header {
        margin-bottom: 32px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eaecef;
      }
      .post-title {
        font-size: 2.25rem;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 12px;
        line-height: 1.25;
        color: #111827;
      }
      .post-meta {
        font-size: 0.95rem;
        color: #6b7280;
      }
      .post-content h1,
      .post-content h2,
      .post-content h3,
      .post-content h4 {
        color: #111827;
        margin-top: 36px;
        margin-bottom: 16px;
        font-weight: 600;
      }
      .post-content h2 {
        font-size: 1.5rem;
        border-bottom: 1px solid #eaecef;
        padding-bottom: 8px;
      }
      .post-content h3 {
        font-size: 1.25rem;
      }
      .post-content p,
      .post-content ul,
      .post-content ol {
        margin-top: 0;
        margin-bottom: 16px;
      }
      .post-content pre {
        background-color: #f6f8fa;
        border-radius: 6px;
        padding: 16px;
        overflow-x: auto;
        font-size: 85%;
        line-height: 1.45;
        border: 1px solid #e1e4e8;
      }
      .post-content code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 85%;
        background-color: rgba(27,31,35,0.05);
        padding: 0.2em 0.4em;
        border-radius: 3px;
      }
      .post-content pre code {
        background-color: transparent;
        padding: 0;
      }
      .post-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }
      .post-content table th,
      .post-content table td {
        border: 1px solid #d0d7de;
        padding: 8px 12px;
        text-align: left;
      }
      .post-content table th {
        background-color: #f6f8fa;
        font-weight: 600;
      }
      .post-footer {
        max-width: 800px;
        margin: 60px auto 40px;
        padding: 24px 24px 0;
        border-top: 1px solid #eaecef;
        color: #6b7280;
        font-size: 0.9rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a href="{{ '/' | relative_url }}" class="site-title">&larr; Back to {{ site.title }}</a>
        <span style="font-size: 0.9rem; color: #6b7280;">Customer Engineer at Google</span>
      </div>
    </header>

    <main class="main-content">
      <article class="post">
        <header class="post-header">
          <h1 class="post-title">{{ page.title }}</h1>
          <div class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
            {% if page.description %} &bull; {{ page.description }}{% endif %}
          </div>
        </header>

        <div class="post-content">
          {{ content }}
        </div>
      </article>
    </main>

    <footer class="post-footer">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </body>
</html>
