---
layout: default
---

<article class="post">
  <h1 class="pagetitle">{{ page.title }}</h1>
  
  <div class="post-meta">
    <span>{{ page.date | date: "%B %d, %Y" }}</span>
    {% if page.categories %}
      <span>&bull; {{ page.categories | join: ", " }}</span>
    {% endif %}
  </div>

  <div class="post-body">
    {{ content }}
  </div>
</article>
