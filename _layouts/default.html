<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <button class="menubtn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰ Menu</button>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="32" height="32" style="display:block; margin-bottom:12px;">
          <rect width="36" height="36" rx="9" fill="#0F172A"/>
          <path d="M18 8L26.5 13V23L18 28L9.5 23V13L18 8Z" fill="none" stroke="#334155" stroke-width="1.8"/>
          <circle cx="18" cy="18" r="3.8" fill="#1A56DB"/>
          <circle cx="18" cy="8" r="2" fill="#94A3B8"/>
          <circle cx="26.5" cy="13" r="2" fill="#94A3B8"/>
          <circle cx="26.5" cy="23" r="2" fill="#94A3B8"/>
          <circle cx="18" cy="28" r="2" fill="#94A3B8"/>
          <circle cx="9.5" cy="23" r="2" fill="#94A3B8"/>
          <circle cx="9.5" cy="13" r="2" fill="#94A3B8"/>
          <line x1="18" y1="18" x2="18" y2="8" stroke="#1A56DB" stroke-width="1.6"/>
          <line x1="18" y1="18" x2="26.5" y2="13" stroke="#334155" stroke-width="1.2"/>
          <line x1="18" y1="18" x2="9.5" y2="13" stroke="#334155" stroke-width="1.2"/>
          <line x1="18" y1="18" x2="18" y2="28" stroke="#334155" stroke-width="1.2"/>
        </svg>
      </div>
      <h1><a href="{{ '/' | relative_url }}">Jawad Amin</a></h1>
      <div class="sub">Customer Engineer @ Google | AI Infra</div>
    </div>

    <nav>
      <div class="glabel">Navigation</div>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.layout == 'post' %}class="active"{% endif %}>Blogs</a>
      <a href="https://github.com/jawadaminGOOG?tab=repositories" target="_blank">Repositories ↗</a>

      <div class="glabel">Recent Posts</div>
      {% for post in site.posts limit:5 %}
        <a href="{{ post.url | relative_url }}">{{ post.title | truncate: 45 }}</a>
      {% endfor %}
    </nav>

    <div class="sidefoot">
      <p><a href="https://github.com/jawadaminGOOG" target="_blank">GitHub</a> &bull; <a href="https://ca.linkedin.com/in/jawadamin" target="_blank">LinkedIn</a></p>
    </div>
  </aside>

  <div class="main">
    <main class="content">
      {{ content }}
    </main>
  </div>
</body>
</html>
